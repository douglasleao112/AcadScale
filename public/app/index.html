<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Quality Life" />
  <title>Quality Life</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="https://i.imgur.com/kWhSIrl.png" />
  <style>
    :root {
      --bg: #f7f7f8;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --primary: #111827;
      --primary-hover: #1f2937;
      --shadow: 0 10px 30px rgba(17, 24, 39, 0.08);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  touch-action: manipulation;
}

body.loading .screen {
  display: none !important;
}

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .screen {
      width: 100%;
      height: 100%;
      display: none;
    }

    .screen.active {
      display: flex;
    }

    .login-screen {
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.95), rgba(247,247,248,1) 55%);
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
      text-align: center;
    }

    .brand img {
      width: 82px;
      height: 82px;
      object-fit: contain;
      border-radius: 20px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    .field label {
      font-size: 14px;
      font-weight: 600;
    }

    .field input {
      width: 100%;
      height: 50px;
      padding: 0 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fff;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .field input:focus {
      border-color: #cbd5e1;
      box-shadow: 0 0 0 4px rgba(17, 24, 39, 0.05);
    }

    .btn {
      width: 100%;
      height: 52px;
      border: none;
      border-radius: 16px;
      background: var(--primary);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s ease, background 0.2s ease;
    }

    .btn:hover { background: var(--primary-hover); }
    .btn:active { transform: scale(0.99); }

    .message {
      min-height: 22px;
      margin-top: 14px;
      font-size: 14px;
      text-align: center;
      color: #dc2626;
    }

    .hint {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      text-align: center;
    }

    .iframe-screen,
    .admin-screen {
      width: 100%;
      height: 100%;
      background: #fff;
      flex-direction: column;
    }

    .topbar {
      width: 100%;
      padding: calc(16px + env(safe-area-inset-top)) 18px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      z-index: 2;
    }

    .topbar .title {
      font-size: 16px;
      font-weight: 800;
    }

    .logout-btn {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      height: 42px;
      padding: 0 14px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
    }

.dropdown.open .dropdown-toggle {
  background: #f3f4f6;
  border-bottom: none;
}
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      flex: 1;
      background: #fff;
    }

    .admin-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--bg);
    }

    .admin-card {
      width: 100%;
      max-width: 460px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .admin-card h2 {
      margin: 0 0 8px;
      font-size: 26px;
      letter-spacing: -0.03em;
    }

    .admin-card p {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.5;
      font-size: 14px;
    }








.actions {
  display: grid;
  gap: 12px;
  justify-items: center; /* CENTRALIZA */
}

.dropdown,
.action-link {
  width: 100%;
  max-width: 320px;
}

.dropdown {
  border: 1px solid var(--border);
  border-radius: 16px;
  background: #fff;
  overflow: hidden;
  box-shadow: 0 4px 14px rgba(17, 24, 39, 0.04);
}

.dropdown-toggle:focus {
  outline: none;
  background: #fff;
}

.dropdown-toggle:active {
  background: #fff;
}

.dropdown-toggle {
  width: 100%;
  min-height: 54px;
  padding: 14px 16px;
  border: none;
  background: #fff;
  color: #111827;
  font-size: 15px;
  font-weight: 800;

  display: flex;
  align-items: center;
  justify-content: center; /* CENTRALIZA TEXTO */

  gap: 8px; /* espaço entre texto e seta */

  cursor: pointer;
  transition: background 0.2s ease, transform 0.12s ease;
}

@media (hover: hover) and (pointer: fine) {
  .dropdown-toggle:hover {
    background: #f9fafb;
  }
}

.dropdown-toggle:active {
  transform: scale(0.99);
}


.dropdown-menu {
  display: none;
  padding: 10px;
  border-top: none;
  background: #f3f4f6;
}

.dropdown-menu {
  padding-top: 6px;
}

.dropdown.open .dropdown-menu {
  display: grid;
  gap: 10px;
}

.action-link {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 54px;
  padding: 14px 16px;
  border-radius: 16px;
  text-decoration: none;
  font-weight: 800;
  font-size: 15px;
  background: #fff;
  color: #111827;
  border: 1px solid var(--border);
  transition: background 0.2s ease, color 0.2s ease, transform 0.12s ease;
}


/* HOVER só no desktop */
@media (hover: hover) and (pointer: fine) {
  .action-link:hover {
    background: #111827;
    color: #fff;
  }
}

.action-link:active,
.action-link.is-pressed {
  background: #111827 !important;
  color: #fff !important;
  border-color: #111827 !important;
}

.dropdown-toggle,
.action-link {
  -webkit-tap-highlight-color: transparent;
}

.action-link,
.dropdown-toggle {
  -webkit-tap-highlight-color: transparent;
}



.action-link:active {
  transform: scale(0.99);
}
    @media (max-width: 480px) {
      .card, .admin-card {
        padding: 22px;
        border-radius: 20px;
      }

      h1 { font-size: 24px; }
      .admin-card h2 { font-size: 22px; }
    }


    .splash-screen {
  position: fixed;
  inset: 0;
  background: #ffffff;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 99999;
  opacity: 1;
  transition: opacity 0.45s ease;
}

.splash-screen.hide {
  opacity: 0;
  pointer-events: none;
}

.splash-logo {
  width: 110px;
  height: 110px;
  object-fit: contain;
  opacity: 0;
  animation: splashLogoAnim 3s ease forwards;
}

@keyframes splashLogoAnim {
  0% {
    opacity: 0;
    transform: scale(0.92);
  }

  20% {
    opacity: 0.2;
  }

  40% {
    opacity: 0.6;
  }

  60% {
    opacity: 1;
    transform: scale(1);
  }

  80% {
    opacity: 1;
  }

  100% {
    opacity: 0;
    transform: scale(1.05);
  }
}


  </style>
</head>
<body>

  <div id="splashScreen" class="splash-screen">
  <img src="https://i.imgur.com/t4RvSVR.png" alt="Logo Quality Life" class="splash-logo" />
</div>


  <section id="loginScreen" class="screen login-screen">
    <div class="card">
      <div class="brand">
        <img src="https://i.imgur.com/t4RvSVR.png" alt="Ícone Quality Life" />
        <div>
          <h1>Quality Life</h1>
      <p class="subtitle">Avance+</p>
        </div>
      </div>

      <form id="loginForm">
        <div class="field">
          <label for="username">Login</label>
          <input id="username" name="username" type="text" autocomplete="username" placeholder="Digite seu login" required />
        </div>

        <div class="field">
          <label for="password">Senha</label>
          <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Digite sua senha" required />
        </div>

        <button class="btn" type="submit">Entrar</button>
        <div class="message" id="message"></div>
      </form>

    </div>
  </section>

<section id="iframeScreen" class="screen iframe-screen">
<div class="topbar">
  <div class="title" id="iframeTitle">Quality Life</div>

  <div style="display: flex; gap: 8px;">
    <button class="logout-btn" id="refreshBtn" title="Atualizar">
      ↻
    </button>

    <button class="logout-btn" id="topbarActionBtn">Sair</button>
  </div>
</div>
  <iframe
    id="appFrame"
    src="about:blank"
    allow="camera; microphone; clipboard-read; clipboard-write; fullscreen"
    referrerpolicy="no-referrer"
    loading="eager"
  ></iframe>
</section>

  <section id="adminScreen" class="screen admin-screen">
    <div class="topbar">
      <div class="title">Painel administrativo</div>
      <button class="logout-btn" id="logoutAdmin">Sair</button>
    </div>

    <div class="admin-content">
      <div class="admin-card">
        <h2>Bem-vindo, admin</h2>
       

        

<div class="actions">
  
    <a class="action-link" href="#" onclick="openAdminLink('https://chatgpt.com/g/g-69adbb3f3fc08191ad9c8a97c1f99fc8-funil-de-eventos', 'Máquina de Eventos', false); return false;">
    Máquina de Eventos
  </a>
  
  <a class="action-link" href="#" onclick="openAdminLink('https://typebot-chat-viewer.vexhyt.easypanel.host/split', 'Avaliar Academia', true); return false;">
    Avaliação
  </a>
  

  <div class="dropdown">
    <button class="dropdown-toggle" type="button" onclick="toggleDropdown(this)">
      <span>Quality Life</span>
      <span>▾</span>
    </button>

    <div class="dropdown-menu">
      <a class="action-link" href="#" onclick="openAdminLink('https://typebot-chat-builder.vexhyt.easypanel.host/typebots/cmng0od2n000gn118fl9weh2e/results', 'Resultados Quality Life', false); return false;">
        > Resultados
      </a>

      <a class="action-link" href="#" onclick="openAdminLink('https://chatgpt.com/g/g-69c58c5919108191869ad8728cfcec6e-qualificacao-quality-life', 'Qualificação Quality Life', false); return false;">
        > Qualificação
      </a>
    </div>
  </div>

  <div class="dropdown">
    <button class="dropdown-toggle" type="button" onclick="toggleDropdown(this)">
      <span>Oscar</span>
      <span>▾</span>
    </button>

    <div class="dropdown-menu">
      <a class="action-link" href="#" onclick="openAdminLink('https://typebot-chat-builder.vexhyt.easypanel.host/typebots/dtyqfhvkafxziqtzk1ia0qe7/results', 'Resultados OSCAR', true); return false;">
       > Resultados
      </a>

      <a class="action-link" href="#" onclick="openAdminLink('https://chatgpt.com/g/g-69d02ff5aeb481919054624d59790a60-qualificacao-oscar', 'Qualificação OSCAR', false); return false;">
        > Qualificação
      </a>
    </div>
  </div>
</div>






      </div>
    </div>
  </section>




  <script>
    document.body.classList.add('loading');

  const AUTH_VERSION = 'v1.3';
  
  const USERS = {
    // ADMIN
    DouglasLeao: {
      password: 'dlpgyn',
      role: 'admin'
    },

        VictorAlamino: {
      password: 'Vap2198',
      role: 'admin'
    },

    // USUÁRIOS
    Usuario1: {
      password: 'user123',
      role: 'user'
    },
    Usuario2: {
      password: 'user123',
      role: 'user'
    }
  };

  const USER_URL = 'https://typebot-chat-viewer.vexhyt.easypanel.host/split';
const splashScreen = document.getElementById('splashScreen');
  const loginScreen = document.getElementById('loginScreen');
  const iframeScreen = document.getElementById('iframeScreen');
  const adminScreen = document.getElementById('adminScreen');
  const loginForm = document.getElementById('loginForm');
  const message = document.getElementById('message');
  const appFrame = document.getElementById('appFrame');
  const topbarActionBtn = document.getElementById('topbarActionBtn');
  const iframeTitle = document.getElementById('iframeTitle');
  const logoutAdmin = document.getElementById('logoutAdmin');


  const refreshBtn = document.getElementById('refreshBtn');


window.addEventListener('pageshow', function (event) {
  if (event.persisted) {
    splashScreen?.remove();
    document.body.classList.remove('loading');
  }
});


refreshBtn.addEventListener('click', function () {
  if (appFrame && appFrame.src !== 'about:blank') {
    appFrame.src = appFrame.src;
  }
});


  let iframeMode = 'user';

  function showScreen(screen) {
    [loginScreen, iframeScreen, adminScreen].forEach(el => el.classList.remove('active'));
    screen.classList.add('active');
  }

  function validateSavedSession() {
  const savedSession = localStorage.getItem('qualityLifeSession');
  if (!savedSession) return null;

  try {
    const session = JSON.parse(savedSession);
    const user = USERS[session.username];

    // Se o usuário foi apagado do código
    if (!user) {
      localStorage.removeItem('qualityLifeSession');
      return null;
    }

    // Se a versão da sessão mudou
    if (session.authVersion !== AUTH_VERSION) {
      localStorage.removeItem('qualityLifeSession');
      return null;
    }

    // Se o tipo de acesso mudou
    if (session.role !== user.role) {
      localStorage.removeItem('qualityLifeSession');
      return null;
    }

    return session;
  } catch (error) {
    localStorage.removeItem('qualityLifeSession');
    return null;
  }
}


function shouldShowSplash() {
  return !sessionStorage.getItem('qualityLifeSplashShown');
}

function markSplashAsShown() {
  sessionStorage.setItem('qualityLifeSplashShown', 'true');
}



function openAdminLink(url, title = 'Quality Life', useIframe = true) {
  if (useIframe) {
    iframeMode = 'admin';
    iframeTitle.textContent = title;
    topbarActionBtn.textContent = 'Voltar';
    appFrame.src = url;
    showScreen(iframeScreen);
  } else {
    window.location.href = url;
  }
}

function toggleDropdown(button) {
  const dropdown = button.parentElement;
  const isOpen = dropdown.classList.contains('open');

  document.querySelectorAll('.dropdown').forEach(item => {
    item.classList.remove('open');
  });

  if (!isOpen) {
    dropdown.classList.add('open');
  }

  button.blur();
}


  function openUserIframe() {
    iframeMode = 'user';
    iframeTitle.textContent = 'Quality Life';
    topbarActionBtn.textContent = 'Sair';
    appFrame.src = USER_URL;
    showScreen(iframeScreen);
  }

  function backToAdminMenu() {
    appFrame.src = 'about:blank';
    showScreen(adminScreen);
  }

  function logout() {
    localStorage.removeItem('qualityLifeSession');
    iframeMode = 'user';
    iframeTitle.textContent = 'Quality Life';
    topbarActionBtn.textContent = 'Sair';
    appFrame.src = 'about:blank';
    loginForm.reset();
    message.textContent = '';
    showScreen(loginScreen);
  }

  function login(username, password) {
    const user = USERS[username];

    if (!user || user.password !== password) {
      message.textContent = 'Login ou senha inválidos.';
      return;
    }

localStorage.setItem('qualityLifeSession', JSON.stringify({
  username,
  role: user.role,
  authVersion: AUTH_VERSION,
  time: Date.now()
}));

    if (user.role === 'admin') {
      showScreen(adminScreen);
      return;
    }

    openUserIframe();
  }

  loginForm.addEventListener('submit', function (event) {
    event.preventDefault();
    message.textContent = '';

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();

    login(username, password);
  });

topbarActionBtn.addEventListener('click', function () {
  if (iframeMode === 'admin') {
    backToAdminMenu();
  } else {
    logout();
  }
});

  logoutAdmin.addEventListener('click', logout);


window.addEventListener('load', () => {
  const session = validateSavedSession();
  const showSplash = shouldShowSplash();

  const startApp = () => {
    if (session) {
      if (session.role === 'admin') {
        showScreen(adminScreen);
      } else {
        openUserIframe();
      }
    } else {
      showScreen(loginScreen);
    }

    document.body.classList.remove('loading');
  };

  if (showSplash) {
    markSplashAsShown();

    setTimeout(() => {
      startApp();

      splashScreen.classList.add('hide');

      setTimeout(() => {
        splashScreen.remove();
      }, 1000);
    }, 3000);
  } else {
    splashScreen.remove();
    startApp();
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(error => {
      console.log('Service Worker não registrado:', error);
    });
  }
});

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    const session = validateSavedSession();
    if (!session) {
      logout();
    }
  }
});


document.querySelectorAll('.action-link').forEach(link => {
  link.addEventListener('touchstart', () => {
    link.classList.add('is-pressed');
  }, { passive: true });

  link.addEventListener('touchend', () => {
    setTimeout(() => link.classList.remove('is-pressed'), 150);
  });

  link.addEventListener('touchcancel', () => {
    link.classList.remove('is-pressed');
  });
});

</script>
</body>
</html>
