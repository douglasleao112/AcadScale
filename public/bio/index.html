<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avance+</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #ffffff;
            background: radial-gradient(circle at top, #0a1f44, #020617);
            overflow: hidden;
        }

        /* Fundo com estrelas */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.3;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 400px;
            width: 90%;
        }

        .logo {
            width: 120px;
            margin-bottom: 10px;
        }

        .brand {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 30px;
            color: #ffffff;
            letter-spacing: 1px;
        }

        .buttons a {
            display: block;
            text-decoration: none;
            color: #ffffff;
            padding: 15px;
            margin: 12px 0;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            background: linear-gradient(90deg, #0ea5e9, #38bdf8);
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
        }

        .buttons a:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.6);
            background: linear-gradient(90deg, #38bdf8, #0ea5e9);
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }

        @media (max-width: 480px) {
            .logo {
                width: 100px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        
        <!-- Logo -->
        <img src="https://i.imgur.com/dVCUAnp.webp" alt="Avance+" class="logo">
        
        <!-- Nome -->
        <div class="brand">Avance+</div>

        <!-- Botões -->
        <div class="buttons">
            <a href="https://grupoavancemais.com/wpposcar2026?utm_source=bio" target="_blank">
                🏆 OSCAR 2026
            </a>

            <a href="https://wa.me/5562984888498?text=Ol%C3%A1%2C%20gostaria%20de%20mais%20informa%C3%A7%C3%B5es%20sobre%20a%20Avance%2B" target="_blank">
                📞 Entre em Contato
            </a>

            <a href="https://www.instagram.com/avancemais.oficial" target="_blank">
                📷 Instagram
            </a>

            <a href="https://grupoavancemais.com/" target="_blank">
                🌐 Quem Somos
            </a>
        </div>

        <!-- Rodapé -->
        <div class="footer">
            © 2026 Avance+ Consultoria Estratégica
        </div>
    </div>
</body>
</html>
