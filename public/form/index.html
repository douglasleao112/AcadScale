<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Seleção - Avence+</title>

  <style>
:root{
  --bg:#0b0b0b;
  --panel:#101010;
  --border:rgba(255,255,255,.08);
  --text:rgba(255,255,255,.92);
  --muted:rgba(255,255,255,.55);
  --accent:#7CFF9B;; /* AZUL */
  --danger:#ef4444;
  --radius:22px;
}
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(1200px 600px at 20% -10%, rgba(124,255,155,.20), transparent 55%),
        radial-gradient(900px 500px at 110% 10%, rgba(124,255,155,.12), transparent 50%),
        var(--bg);
      color:var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:28px 14px;
      overflow-x:hidden;
    }
    .wrap{
      width:min(860px, 100%);
      position:relative;
    }
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:14px;
    }
    .logo{
      height:34px;
      width:auto;
      opacity:.95;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,.45));
    }

    .whatsIcon{
  width:18px;
  height:18px;
  display:inline-block;
  flex-shrink:0;
}

    .card{
      border:1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border-radius: var(--radius);
      padding:22px 18px;
      box-shadow: 0 30px 90px rgba(0,0,0,.55);
      position:relative;
      overflow:hidden;
    }

    .progress{
      height:10px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid var(--border);
      overflow:hidden;
      margin:10px 0 16px;
    }
    .bar{
      height:100%;
      width:12.5%;
      background: linear-gradient(90deg, rgba(124,255,155,.95), rgba(124,255,155,.45));
      border-radius:999px;
      transition: width .35s ease;
    }

    .step{
      display:none;
      animation: in .38s ease both;
    }
    .step.active{display:block;}
    @keyframes in{
      from{opacity:0; transform: translateY(14px) scale(.995);}
      to{opacity:1; transform: translateY(0) scale(1);}
    }

    label{
      display:block;
      font-size:13px;
      color:var(--muted);
      margin:0 0 6px;
    }
    input, textarea{
      width:100%;
      padding:14px 14px;
      border-radius: 16px;
      border:1px solid var(--border);
      background: rgba(0,0,0,.35);
      color:var(--text);
      outline:none;
      font-size:15px;
      transition: border-color .2s ease, transform .2s ease;
    }
    input:focus, textarea:focus{
      border-color: rgba(124,255,155,.65);
      transform: translateY(-1px);
    }
    textarea{min-height:120px; resize:vertical;}
    .row{display:grid; gap:12px;}

    .choices{display:grid; gap:10px; margin-top:6px;}
    .choice{
      display:flex;
      gap:10px;
      align-items:center;
      padding:12px 12px;
      border-radius:16px;
      border:1px solid var(--border);
      background: rgba(255,255,255,.03);
      cursor:pointer;
      transition: transform .15s ease, border-color .15s ease, background .15s ease;
      user-select:none;
    }
    .choice:hover{
      transform: translateY(-1px);
      border-color: rgba(255,255,255,.14);
      background: rgba(255,255,255,.05);
    }
    .choice input{width:auto; margin:0}
    .choice span{color:rgba(255,255,255,.86); font-size:14px;}

    .actions{
      display:flex;
      gap:10px;
      margin-top:16px;
      flex-wrap:wrap;
    }
    button{
      border:0;
      border-radius:999px;
      padding:12px 16px;
      cursor:pointer;
      font-weight:800;
      font-size:14px;
      letter-spacing:.2px;
      transition: transform .15s ease, opacity .15s ease;
    }
    button:active{transform: scale(.985);}
    .btn-ghost{
      background: rgba(255,255,255,.06);
      color:rgba(255,255,255,.8);
      border:1px solid var(--border);
    }
    .btn-main{
      background: linear-gradient(180deg, rgba(124,255,155,.95), rgba(34,197,94,.78));
  color:#07120a;
  box-shadow: 0 18px 40px rgba(124,255,155,.25);
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
    }
    .btn-main[disabled]{opacity:.55; cursor:not-allowed;}

    .error{
      margin-top:12px;
      color: rgba(239,68,68,.95);
      font-size:13px;
      display:none;
    }

    .done{
      text-align:center;
      padding:10px 4px 8px;
    }
    .done h2{
      margin:10px 0 8px;
      font-size:20px;
    }
    .done p{
      margin:0;
      color:var(--muted);
      line-height:1.55;
      font-size:14px;
    }

    .spinner{
      width:18px;height:18px;
      border-radius:999px;
      border:2px solid rgba(255,255,255,.18);
      border-top-color: rgba(255,255,255,.75);
      display:inline-block;
      vertical-align:middle;
      margin-right:8px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* CHECK ANIMADO */
    .checkWrap{
      display:flex;
      align-items:center;
      justify-content:center;
      margin:6px 0 10px;
    }
    .check{
      width:72px;
      height:72px;
      border-radius:999px;
      border:2px solid rgba(124,255,155,.25);
      background: radial-gradient(circle at 30% 20%, rgba(124,255,155,.35), rgba(0,0,0,.0) 55%),
                  rgba(255,255,255,.03);
      box-shadow: 0 18px 45px rgba(124,255,155,.18);
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      transform: scale(.85);
      opacity:0;
    }
    .check.show{
      animation: pop .42s ease both;
    }
    @keyframes pop{
      from{transform: scale(.75); opacity:0;}
      to{transform: scale(1); opacity:1;}
    }
    .check svg{
      width:38px;
      height:38px;
    }
    .check path{
      stroke: rgba(255,255,255,.92);
      stroke-width: 3.6;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      stroke-dasharray: 60;
      stroke-dashoffset: 60;
    }
    .check.show path{
      animation: draw .55s .08s ease forwards;
    }
    @keyframes draw{
      to{stroke-dashoffset: 0;}
    }
    .ringPulse{
      position:absolute;
      inset:-2px;
      border-radius:999px;
      border:2px solid rgba(124,255,155,.18);
      opacity:0;
    }
    .check.show .ringPulse{
      animation: pulse 1.1s .15s ease-out forwards;
    }
    @keyframes pulse{
      0%{transform: scale(1); opacity:.0;}
      35%{opacity:.55;}
      100%{transform: scale(1.18); opacity:0;}
    }

/* BOTÃO WHATS SIMPLES */
.btn-whats{
  margin-top:16px;
  width:min(320px, 100%);
  padding:14px 18px;
  font-size:15px;
  gap:10px;
  justify-content:center;

  border:1px solid rgba(124,255,155,.35);
  background: rgba(124,255,155,.12);
  color:#ffffff;
  box-shadow:none;

  position:relative;
  overflow:hidden;
  text-decoration:none;
}

.btn-whats:hover{
  background: rgba(124,255,155,.18);
  border-color: rgba(124,255,155,.65);
  transform: translateY(-1px);
}

.btn-whats:active{
  transform: translateY(0) scale(.99);
}

.btn-whats:before{
  display:none;
}

.btn-whats .whatsIconSvg{
  width:22px;
  height:22px;
  flex-shrink:0;
  display:block;
}

.wa-text{
  display:flex;
  flex-direction:row;
  line-height:1;
  text-align:center;
}

.wa-title{
  font-weight:800;
  font-size:14px;
  letter-spacing:.2px;
}

.wa-sub{
  display:none;
}

.wa-badge{
  display:none;
}
    .hide{display:none!important;}




@keyframes shine{
  to{ transform: translateX(120%); }
}

.btn-whats .whatsIcon{
  width:18px;
  height:18px;
  opacity:.95;
  filter: drop-shadow(0 10px 18px rgba(0,0,0,.28));
}

/* Badge “comunidade” */
.wa-badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  font-size:11px;
  font-weight:900;
  letter-spacing:.3px;
  padding:6px 10px;
  border-radius:999px;
  background: rgba(0,0,0,.22);
  border:1px solid rgba(255,255,255,.14);
  color: rgba(255,255,255,.92);
}

/* texto do botão */
.wa-text{
  display:flex;
  flex-direction:column;
  line-height:1.15;
  text-align:left;
}
.wa-title{
  font-weight:900;
  font-size:14px;
  letter-spacing:.2px;
}
.wa-sub{
  font-size:12px;
  opacity:.82;
  font-weight:700;
}

/* AUMENTAR ÍCONE DO WHATS NO BOTÃO */
.btn-whats .whatsIconSvg{
  width:32px;
  height:32px;
  flex-shrink:0;
  display:block;
}
  </style>

  <script>
    // COLE A URL DO SEU WEB APP AQUI (termina com /exec)
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxeoeQZiXVrAcPWGXeB1oznC_-IbNdP4nUQyj8S5czCFTXWFxPcB6vqbVZ0VKmTzdjK/exec";

    const form = document.getElementById("quiz");
    const steps = [...document.querySelectorAll(".step")];
    const bar = document.getElementById("bar");
    const error = document.getElementById("error");

    const backBtn = document.getElementById("backBtn");
    const nextBtn = document.getElementById("nextBtn");

    const done = document.getElementById("done");
    const spinner = document.getElementById("spinner");
    const statusText = document.getElementById("statusText");
    const progressWrap = document.getElementById("progressWrap");
    const check = document.getElementById("check");

    const whatsappInput = document.getElementById("whatsapp");
    const whatsBtn = document.getElementById("whatsBtn");
    const TOTAL_STEPS = 9;
    let current = 1;

    function setStep(n){
      current = n;
      steps.forEach(s => s.classList.toggle("active", Number(s.dataset.step) === current));

      const pct = (current / TOTAL_STEPS) * 100;
      bar.style.width = pct + "%";

      backBtn.style.display = current === 1 ? "none" : "inline-flex";
      nextBtn.textContent = current === TOTAL_STEPS ? "Enviar" : "Continuar";

      error.style.display = "none";
      error.textContent = "";

      const active = steps.find(s => Number(s.dataset.step) === current);
      const first = active.querySelector("input, textarea");
      if(first) setTimeout(() => first.focus(), 80);
    }

    // mascara: (99)99999-9999 e impede letras
    function formatWhatsApp(value){
      const digits = (value || "").replace(/\D/g,"").slice(0, 11);
      const ddd = digits.slice(0,2);
      const part1 = digits.slice(2,7);
      const part2 = digits.slice(7,11);

      let out = "";
      if(ddd) out += "(" + ddd;
      if(ddd.length === 2) out += ")";
      if(part1) out += part1;
      if(part2) out += "-" + part2;
      return out;
    }

    whatsappInput.addEventListener("input", () => {
      const before = whatsappInput.value;
      whatsappInput.value = formatWhatsApp(before);
      whatsappInput.setSelectionRange(whatsappInput.value.length, whatsappInput.value.length);
    });

    function normalizePhoneMasked(v){
      return (v || "").trim();
    }

    function validateStep(){
      const active = steps.find(s => Number(s.dataset.step) === current);
      const requiredInputs = [...active.querySelectorAll("[required]")];

      for (const el of requiredInputs){
        if(el.type === "radio"){
          const name = el.name;
          const any = active.querySelector(`input[type="radio"][name="${name}"]:checked`);
          if(!any) return { ok:false, msg:"Selecione uma opção para continuar." };
        } else {
          if(!el.value || !String(el.value).trim()){
            return { ok:false, msg:"Preencha o campo obrigatório para continuar." };
          }
          if(el.id === "whatsapp"){
            const ok = /^\(\d{2}\)\d{5}-\d{4}$/.test(el.value.trim());
            if(!ok) return { ok:false, msg:"WhatsApp inválido. Use o formato (99)99999-9999." };
          }
        }
      }
      return { ok:true };
    }

    function collectData(){
      const fd = new FormData(form);
      const obj = Object.fromEntries(fd.entries());

      obj.whatsapp = normalizePhoneMasked(obj.whatsapp);

      const url = new URL(window.location.href);
      obj.utm_source = url.searchParams.get("utm_source") || "";
      obj.utm_medium = url.searchParams.get("utm_medium") || "";
      obj.utm_campaign = url.searchParams.get("utm_campaign") || "";
      obj.utm_content = url.searchParams.get("utm_content") || "";
      obj.utm_term = url.searchParams.get("utm_term") || "";
      obj.page_url = window.location.href;
      obj.user_agent = navigator.userAgent;

      return obj;
    }

    async function sendData(payload){
      if(!WEB_APP_URL){
        throw new Error("URL do Web App não definida.");
      }

      const res = await fetch(WEB_APP_URL, {
        method: "POST",
        headers: { "Content-Type":"text/plain;charset=utf-8" },
        body: JSON.stringify(payload)
      });

      const text = await res.text();
      let json = {};
      try{ json = JSON.parse(text); } catch(e){}

      if(!res.ok || json.ok === false){
        throw new Error(json.error || "Falha ao enviar. Verifique o Apps Script e permissões.");
      }
    }

    async function submit(){
      // esconde barra de progresso na etapa final (tela de obrigado)
      if(progressWrap) progressWrap.classList.add("hide");
      if (whatsBtn) whatsBtn.classList.add("hide");
      form.style.display = "none";
      done.style.display = "block";
      spinner.style.display = "inline-block";
      statusText.textContent = "Enviando suas respostas...";

      // garante que o check começa oculto
      check.classList.remove("show");

      try{
        const payload = collectData();
        await sendData(payload);

        spinner.style.display = "none";
        statusText.textContent = "Dados enviados com sucesso.";

       
// anima check e depois mostra o botão do WhatsApp
setTimeout(() => {
  check.classList.add("show");

  // aparece depois do check iniciar (ajuste o tempo se quiser)
  setTimeout(() => {
    if (whatsBtn) whatsBtn.classList.remove("hide");
  }, 350);

}, 120);

      } catch(err){
        spinner.style.display = "none";
        statusText.textContent = "Não foi possível enviar agora. Tente novamente.";

        const msg = String(err && err.message ? err.message : err);
        const p = document.createElement("p");
        p.style.marginTop = "10px";
        p.style.color = "rgba(239,68,68,.9)";
        p.style.fontSize = "13px";
        p.textContent = msg;
        done.appendChild(p);

        const retry = document.createElement("button");
        retry.className = "btn-main";
        retry.style.marginTop = "12px";
        retry.textContent = "Tentar novamente";
        retry.onclick = () => window.location.reload();
        done.appendChild(retry);
      }
    }

    nextBtn.addEventListener("click", async () => {
      const v = validateStep();
      if(!v.ok){
        error.style.display = "block";
        error.textContent = v.msg;
        return;
      }

      if(current < TOTAL_STEPS){
        setStep(current + 1);
      } else {
        nextBtn.disabled = true;
        nextBtn.innerHTML = '<span class="spinner"></span> Enviando';
        await submit();
      }
    });

    backBtn.addEventListener("click", () => {
      if(current > 1) setStep(current - 1);
    });

    document.addEventListener("keydown", (e) => {
      if(e.key === "Enter"){
        const a = document.activeElement;
        if(a && a.tagName === "TEXTAREA") return;
        e.preventDefault();
        nextBtn.click();
      }
    });

    setStep(1);
  </script>
</body>
</html>
