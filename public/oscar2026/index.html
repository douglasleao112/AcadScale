<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Oscar das Academias</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      background: #000;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px;
    }

    .wrap {
      width: 100%;
      max-width: 294px;
    }

    .video-box {
      position: relative;
      width: 100%;
      border-radius: 14px;
      overflow: hidden;
      background: #000;
    }

    video {
      width: 100%;
      display: block;
    }

    .cta {
      display: none;
      width: 100%;
      margin-top: 16px;
      text-align: center;
      background: #18b84a;
      color: #fff;
      font-size: 18px;
      font-weight: bold;
      padding: 16px;
      border-radius: 10px;
      text-decoration: none;
      animation: pulse 1.5s infinite;
    }

    .cta.show {
      display: block;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

  <div class="wrap">
    <div class="video-box">

      <!-- PREVIEW MP4 -->
      <video 
        id="previewVideo"
        autoplay
        muted
        loop
        playsinline
        style="display:block;"
      >
        <source src="https://video.wixstatic.com/video/7f5efc_fbbacaaf63794c70b0355062f3cb5b9e/480p/mp4/file.mp4" type="video/mp4">
      </video>

      <!-- VÍDEO PRINCIPAL -->
      <video 
        id="mainVideo"
        playsinline
        preload="metadata"
        style="display:none;"
      >
        <source src="https://video.wixstatic.com/video/7f5efc_fcfcacac49ed429baa8d6701b0581b51/1080p/mp4/file.mp4" type="video/mp4">
      </video>

      <!-- CAMADA DE CLIQUE -->
      <div 
        id="overlay"
        style="
          position:absolute;
          inset:0;
          cursor:pointer;
          z-index:5;
        "
      ></div>
    </div>

    <a 
      id="cta" 
      class="cta" 
      href="https://www.sympla.com.br/evento/premio-quality-life-goias/3373392"
      target="_blank"
      rel="noopener noreferrer"
    >
      Participar do OSCAR
    </a>
  </div>

  <script>
    const preview = document.getElementById("previewVideo");
    const main = document.getElementById("mainVideo");
    const overlay = document.getElementById("overlay");
    const cta = document.getElementById("cta");

    let started = false;
    let shown = false;

    function startVideo() {
      if (started) return;
      started = true;

      preview.style.display = "none";
      main.style.display = "block";
      overlay.style.display = "none";

      main.play().catch((err) => {
        console.log("Erro ao reproduzir:", err);
      });
    }

    function showCTA() {
      if (!shown && main.currentTime >= 30) {
        shown = true;
        cta.classList.add("show");
      }
    }

    overlay.addEventListener("click", startVideo);
    main.addEventListener("timeupdate", showCTA);
  </script>

</body>
</html>
