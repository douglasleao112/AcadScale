<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Oscar das Academias 2026</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      background: #000;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px;
    }

    .wrap {
      width: 100%;
      max-width: 360px;   /* tamanho do video */
    }

    .video-box {
      position: relative;
      width: 100%;
      border-radius: 14px;
      overflow: hidden;
      background: #000;
    }

.urgencia {
  display: none;
  margin-top: 10px;
  text-align: center;
  color: #fff;
  font-size: 13px;
  opacity: 0.9;
}

.urgencia.show {
  display: block;
}

.barra-urgencia {
  width: 100%;
  height: 4px;
  background: rgba(255,255,255,0.2);
  border-radius: 3px;
  margin-top: 6px;
  overflow: hidden;
}

.barra-fill {
  width: 0;
  height: 100%;
  background: #ffffff;
  border-radius: 3px;
  transition: width 2s ease;
}

.barra-fill.animate {
  width: 75%;
}

    video {
      width: 100%;
      display: block;
    }

    .cta {
      display: none;
      width: 100%;
      margin-top: 16px;
      text-align: center;
      background: #18b84a;
      color: #fff;
      font-size: 18px;
      font-weight: bold;
      padding: 16px;
      border-radius: 10px;
      text-decoration: none;
      animation: pulse 1.5s infinite;
    }

    .cta.show {
      display: block;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

      #progressBar {
    position: absolute;
    left: 0;
    bottom: 0;
    height: 14px;
    width: 0%;
    background: red;
    z-index: 6;
    transition: width 0.15s linear;
  }
  </style>
</head>
<body>

  <div class="wrap">
    <div class="video-box">

      <!-- POSTER -->
      <video 
        id="previewVideo"
        autoplay
        muted
        loop
        playsinline
        style="display:block;"
      >
        <source src="https://video.wixstatic.com/video/7f5efc_61d265f796224f709c61e052e9194fd9/720p/mp4/file.mp4" type="video/mp4">
      </video>

      <!-- VÍDEO PRINCIPAL -->
      <video 
        id="mainVideo"
        playsinline
        preload="metadata"
        style="display:none;"
      >
        <source src="https://video.wixstatic.com/video/7f5efc_61d265f796224f709c61e052e9194fd9/720p/mp4/file.mp4" type="video/mp4">
      </video>

 <div id="progressBar"></div>

      <!-- CAMADA DE CLIQUE -->
      <div 
        id="overlay"
        style="
          position:absolute;
          inset:0;
          cursor:pointer;
          z-index:5;
        "
      ></div>
    </div>

<div id="urgencia" class="urgencia">
  <span>VAGAS PREENCHIDAS: 75%</span>
  <div class="barra-urgencia">
    <div class="barra-fill"></div>
  </div>
</div>

   <a 
  id="cta" 
  class="cta" 
  href="https://www.sympla.com.br/evento/premio-quality-life-goias/3373392"
  target="_blank"
  rel="noopener noreferrer"
>
  Participar do OSCAR das Academias
</a>
  </div>

  <script>
    const barraFill = document.querySelector(".barra-fill");
    const urgencia = document.getElementById("urgencia");
  const preview = document.getElementById("previewVideo");
  const main = document.getElementById("mainVideo");
  const overlay = document.getElementById("overlay");
  const cta = document.getElementById("cta");
  const progressBar = document.getElementById("progressBar");

  let started = false;
  let shown = false;

  function startVideo() {
    if (started) return;
    started = true;

    preview.style.display = "none";
    main.style.display = "block";
    overlay.style.display = "none";

    main.play().catch((err) => {
      console.log("Erro ao reproduzir:", err);
    });
  }
// tempo para aparecer a CTA
function showCTA() {
  if (!shown && main.currentTime >= 30) {
    shown = true;
    cta.classList.add("show");
    urgencia.classList.add("show");

    setTimeout(() => {
      barraFill.classList.add("animate");
    }, 100);
  }
}

  function updateProgressBar() {
    const t = main.currentTime;
    const d = main.duration;

    if (!d || isNaN(d)) return;

    let percent = 0;

    if (t <= 30) {
      // 0s a 30s = 0% a 50%
      percent = (t / 30) * 50;
    } else if (t <= 90) {
      // 30s a 90s = 50% a 75%
      percent = 50 + ((t - 30) / 60) * 25;
    } else {
      // 90s até o final = 75% a 100%
      percent = 75 + ((t - 90) / (d - 90)) * 25;
    }

    if (percent > 100) percent = 100;
    if (percent < 0) percent = 0;

    progressBar.style.width = percent + "%";
  }

  overlay.addEventListener("click", startVideo);
  main.addEventListener("timeupdate", showCTA);
  main.addEventListener("timeupdate", updateProgressBar);

  main.addEventListener("ended", () => {
    progressBar.style.width = "100%";
  });
</script>
</body>
</html>
