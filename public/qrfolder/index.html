<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AcadScale</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: #ffffff;
    background: radial-gradient(circle at top, #071a3a, #020617);
    overflow: hidden;
}

/* Fundo com estrelas */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: url("https://www.transparenttextures.com/patterns/stardust.png");
    opacity: 0.25;
    z-index: 0;
}

/* Container principal */
.container {
    position: relative;
    z-index: 1;
    width: 90%;
    max-width: 420px;
    padding: 30px 25px;
    border-radius: 20px;
}

     .footer {
            margin-top: 20px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }

/* Logo */
.logo {
    width: 110px;
    margin-bottom: 10px;
}

/* Nome da marca */
.brand {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 30px;
    letter-spacing: 1px;
}

/* Botões */
.buttons {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

/* Estilo Glassmorphism */
.btn {
    display: block;
    text-decoration: none;
    color: #ffffff;
    padding: 15px;
    font-size: 16px;
    font-weight: 500;
    border-radius: 14px;
    backdrop-filter: blur(12px);
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.2);
    box-shadow: 0 0 15px rgba(0, 195, 255, 0.1);
    transition: all 0.3s ease;
}

/* Efeito ao passar o mouse */
.btn:hover {
    transform: translateY(-3px) scale(1.02);
    background: rgba(255, 255, 255, 0.15);
    box-shadow: 0 0 25px rgba(0, 195, 255, 0.3);
    border: 1px solid rgba(0, 195, 255, 0.6);
}

/* Animação suave */
@keyframes glow {
    0% {
        box-shadow: 0 0 10px rgba(0, 195, 255, 0.2);
    }
    50% {
        box-shadow: 0 0 25px rgba(0, 195, 255, 0.45);
    }
    100% {
        box-shadow: 0 0 10px rgba(0, 195, 255, 0.2);
    }
}

.animate {
    animation: glow 2s ease-in-out;
}

/* Responsividade */
@media (max-width: 480px) {
    .logo {
        width: 95px;
    }

    .brand {
        font-size: 20px;
    }

    .btn {
        font-size: 15px;
        padding: 14px;
    }
}
</style>
</head>

<body>
<div class="container">

    <!-- Logo -->
    <img src="https://i.imgur.com/dVCUAnp.webp"   class="logo">

    <!-- Nome -->
    <div class="brand">AcadScale</div>

    <!-- Botões -->
    <div class="buttons">
        <!-- <a href="https://grupoavancemais.com/wpposcar2026?utm_source=bio" target="_blank" class="btn">OSCAR 2026</a> -->
        <a href="https://grupoavancemais.com/form/" target="_blank" class="btn">Entre em contato</a>
        <a href="https://www.instagram.com/avancemais.oficial" target="_blank" class="btn">Instagram</a>
        <a href="https://grupoavancemais.com/" target="_blank" class="btn">Quem somos</a>
    </div>
     <!-- Rodapé -->
        <div class="footer">
            © 2026 AcadScale Consultoria Estratégica
        </div>
</div>



<script>
/* Animação aleatória entre os botões */
const buttons = document.querySelectorAll('.btn');

function animateRandomButton() {
    buttons.forEach(btn => btn.classList.remove('animate'));
    
    const randomIndex = Math.floor(Math.random() * buttons.length);
    const randomButton = buttons[randomIndex];
    
    randomButton.classList.add('animate');

    setTimeout(() => {
        randomButton.classList.remove('animate');
    }, 2000);
}

// Executa a cada intervalo aleatório
function startRandomAnimation() {
    animateRandomButton();
    const randomTime = Math.floor(Math.random() * 3000) + 2000;
    setTimeout(startRandomAnimation, randomTime);
}

// Inicia a animação após carregar a página
window.onload = startRandomAnimation;
</script>

</body>
</html>
