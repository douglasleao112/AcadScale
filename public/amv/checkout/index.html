  <style>
    * {

    }

    body {
      margin: 0;

      font-family: Arial, sans-serif;

    .container {
      width: 100%;

.card {
  background: #161616;
  border: 1px solid #222;
  border-radius: 18px;

}

h1 {

}


.qr {

  max-width: 170px;

}

    .pix-code {
      width: 100%;
      min-height: 120px;
      background: #0f0f0f;
      color: #ddd;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 14px;
      font-size: 13px;
      resize: none;
      outline: none;
      word-break: break-all;
    }

.btn {
  position: relative;
  width: 100%;
  border: none;
  border-radius: 10px;
  padding: 15px;
  margin-top: 14px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  color: #fff;
  background: #0f7a25;

  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;

  overflow: hidden;
  z-index: 1;
}

.btn::before {
  content: "";
  position: absolute;
  inset: -4px;
  background: conic-gradient(
    from 0deg,
    transparent 0deg,
    transparent 245deg,
    rgba(0, 255, 80, 0.15) 275deg,
    rgba(0, 255, 80, 0.45) 295deg,
    rgba(255, 255, 255, 0.7) 310deg,
    rgba(0, 255, 80, 1) 322deg,
    transparent 340deg
  );
  animation: rotateGlow 3s linear infinite;
  z-index: -2;
}
.btn::after {
  content: "";
  position: absolute;
  inset: 2px;
  background: #0f7a25;
  border-radius: 8px;
  z-index: -1;
}

@keyframes rotateGlow {
  0% {
    transform: rotate(0deg);
    opacity: 0.9;
  }
  50% {
    opacity: 0.55;
  }
  100% {
    transform: rotate(360deg);
    opacity: 0.9;
  }
}

    .btn:hover {
      background: #119c2f;
    }

    .info {
      margin-top: 20px;
      font-size: 15px;
      color: #d6d6d6;
      line-height: 1.4;
    }


.whatsapp-box {
  position: fixed;
  right: 4px;
  bottom: 20px;
  width: 230px;
  height: 48px;
  z-index: 9999;
  pointer-events: auto;
}

.whatsapp-float {
  position: absolute;
  right: 0;
  top: 0;

  width: 48px;
  height: 48px;
  border-radius: 50%;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,.35);
  z-index: 3;

  opacity: 0;
  animation: fadeWhatsapp 3s ease forwards;
  animation-delay: 1s;

  pointer-events: auto;
}

.whatsapp-label {
  position: absolute;
  right: 24px;
  top: 6px;
  text-decoration: none;
  cursor: pointer;
  height: 36px;
  padding: 0 34px 0 14px;

  display: flex;
  align-items: center;

  background: #1d6b28;
  color: #fff;
  font-size: 13px;
  font-weight: 700;
  white-space: nowrap;

  border-radius: 999px 0 0 999px;

opacity: 0;
transform: none;
animation: fadeWhatsappLabel 2s ease forwards;
animation-delay: 2.5s;

  z-index: 2;
}

.whatsapp-float img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

@keyframes fadeWhatsapp {
  from {
    opacity: 0;
  }
  to {
    opacity: 1;
  }
}

@keyframes fadeWhatsappLabel {
  from {
    opacity: 0;
  }

  to {
    opacity: 1;
  }
}

    .copied {

    }


    .pix-wrapper {
  position: relative;
}

.copy-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.45);
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
  color: #00ff4c;
  font-weight: bold;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 12px;
  z-index: 2;

  opacity: 0;
  pointer-events: none;

}

.copy-overlay.show {

}



.outside-info {

<script>
  function copiarPix() {
    const pixCode = document.getElementById("pixCode");
    const copyOverlay = document.getElementById("copyOverlay");
