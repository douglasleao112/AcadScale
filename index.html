<script>const REDIRECT_AMV=true;if(REDIRECT_AMV&&location.pathname!="/amv")location.href="/amv";</script>

    <style>
        /* Reset fundamental corrigido para GSAP Pinning */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            scroll-behavior: auto; /* GSAP prefere auto para scrub suave */
        }
        
        /* Personalização da Scrollbar */
        body::-webkit-scrollbar {
            width: 8px;
        }
        body::-webkit-scrollbar-track {
            background: #000;
        }
        body::-webkit-scrollbar-thumb {
            background: #1e1e1e;
            border-radius: 10px;
        }
        body::-webkit-scrollbar-thumb:hover {
            background: #2a2a2a;
        }

        .font-serif-italic {
            font-family: 'Playfair Display', serif;
            font-style: italic;
        }

        #root {
            width: 100%;
            display: flex;
            flex-direction: column;
        }
    </style>
