
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margem Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Playfair+Display:ital,wght@1,400;1,700&display=swap" rel="stylesheet">
    <style>
        /* Reset fundamental para evitar scroll duplo */
        html {
            height: 100%;
            overflow: hidden; /* Trava o html */
        }
        
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-y: auto; /* Apenas o body rola verticalmente */
            overflow-x: hidden; /* Nunca rola horizontalmente */
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        
        /* Personalização da Scrollbar */
        body::-webkit-scrollbar {
            width: 8px;
        }
        body::-webkit-scrollbar-track {
            background: #000;
        }
        body::-webkit-scrollbar-thumb {
            background: #1e1e1e;
            border-radius: 10px;
        }
        body::-webkit-scrollbar-thumb:hover {
            background: #2a2a2a;
        }

        .font-serif-italic {
            font-family: 'Playfair Display', serif;
            font-style: italic;
        }
    </style>
<script type="importmap">

  }
}
</script>
</head>

</body>
</html>
